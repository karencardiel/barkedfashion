<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarkedShop — Tu Bolsa</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="../index.html" class="logo-container">
                <img src="../images/logotipo.png" alt="BarkedShop Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="women.html">Mujeres</a></li>
                <li><a href="men.html">Hombres</a></li>
                <li><a href="new.html">Novedades</a></li>
            </ul>
            <div class="nav-actions">
                <a href="account.html">Mi Cuenta</a>
                <a href="cart.html" style="font-weight: bold;">🛒 (<span id="cart-counter">0</span>)</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2>Mi Carrito</h2>
        <div class="cart-layout">
            <section class="cart-items-wrapper" id="cart-items-container"></section>
            <section class="cart-summary">
                <h3>Resumen</h3>
                <div class="summary-row"><span>Envío estándar:</span><span style="color:green;">Gratuito</span></div>
                <div class="summary-row summary-total"><span>Total a pagar:</span><span id="cart-total-price">$0.00</span></div>
                <button class="btn-checkout" onclick="window.processCheckout()">Confirmar Compra</button>
            </section>
        </div>
    </main>

    <!-- main.js PRIMERO: define cart, saveCart, API_BASE_URL -->
    <script src="../js/main.js"></script>
    <script src="../js/analytics.js"></script>

    <!-- Lógica del carrito DESPUÉS de que main.js ya cargó -->
    <script>
        function displayCart() {
            const wrapper = document.getElementById('cart-items-container');
            const totalDisplay = document.getElementById('cart-total-price');
            if (!wrapper) return;

            if (cart.length === 0) {
                wrapper.innerHTML = '<p style="padding:1rem;">No tienes artículos en tu bolsa.</p>';
                if (totalDisplay) totalDisplay.textContent = '$0.00';
                return;
            }

            let total = 0;
            wrapper.innerHTML = cart.map((item, index) => {
                const price = Number(item.price);
                total += price * item.quantity;
                const imageUrl = item.image_url && item.image_url.trim() !== ''
                    ? item.image_url
                    : `https://placehold.co/80x90?text=${encodeURIComponent(item.name)}`;
                return `
                    <div class="cart-item">
                        <img src="${imageUrl}" alt="${item.name}"
                             style="width:80px;height:90px;object-fit:cover;border-radius:6px;"
                             onerror="this.src='https://placehold.co/80x90?text=Barked'">
                        <div style="flex:1;padding:0 1rem;">
                            <h4 style="margin:0 0 .25rem;">${item.name}</h4>
                            <p style="margin:0;color:#666;">Cantidad: ${item.quantity} × $${price.toFixed(2)}</p>
                            <p style="margin:.25rem 0 0;font-weight:600;">$${(price * item.quantity).toFixed(2)}</p>
                        </div>
                        <button class="btn-remove" onclick="window.removeCartItem(${index})">Quitar</button>
                    </div>
                `;
            }).join('');

            if (totalDisplay) totalDisplay.textContent = `$${total.toFixed(2)}`;
        }

        window.removeCartItem = function(index) {
            cart.splice(index, 1);
            saveCart();
            displayCart();
        };

        window.processCheckout = async function() {
            if (cart.length === 0) return alert('Tu bolsa está vacía.');

            const payload = {
                shipping_addr: 'Mérida, Yucatán, México',
                items: cart.map(i => ({ product_id: i.id, qty: i.quantity }))
            };

            try {
                const res = await fetch(`${API_BASE_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    alert(`¡Orden confirmada! ID de rastreo: #${data.orderId}`);
                    cart = [];
                    saveCart();
                    displayCart();
                } else {
                    alert('Hubo un problema al procesar tu orden. Intenta de nuevo.');
                }
            } catch (e) {
                alert('Error de conexión al confirmar la orden.');
            }
        };

        // displayCart corre después de que main.js ya definió `cart`
        document.addEventListener('DOMContentLoaded', displayCart);
    </script>
</body>
</html>
